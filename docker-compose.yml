version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: asep_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.3.0
    container_name: asep_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

volumes:
  mongo_data:
  qdrant_data:
